<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>매일 — Tela inicial</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Dongle:wght@300;400;700&family=Noto+Sans+KR:wght@300;400&family=Cormorant+Garamond:ital,wght@0,300;1,300&display=swap');

* { box-sizing: border-box; margin: 0; padding: 0; }

:root{
  --paper:#F8F4EE;
  --paper2:#EDE6D6;
  --gold:#C9B99A;
  --ink:#2E2519;
  --ink2:#7A6E5A;
  --ink3:#B0A08A;
}

html, body {
  background:#E8E2D8;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Noto Sans KR', sans-serif;
}

.phone{
  width:100%;max-width:390px;
  margin:24px auto;
  background:var(--paper);
  min-height:800px;
  display:flex;flex-direction:column;
  overflow:hidden;
  position:relative;
  border-radius: 40px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.18);
}

.photo-zone{
  width:100%;height:420px;position:relative;overflow:hidden;flex-shrink:0;
}
.photo-zone svg{width:100%;height:100%;display:block;}
.photo-fade{
  position:absolute;bottom:0;left:0;right:0;height:160px;
  background:linear-gradient(to bottom, transparent, var(--paper));
}

.sbar{
  position:absolute;top:0;left:0;right:0;
  padding:14px 24px 0;
  display:flex;justify-content:space-between;
  font-family:'Noto Sans KR',sans-serif;
  font-size:11px;color:rgba(255,255,255,0.9);font-weight:300;z-index:2;
}

.content{flex:1;padding:0 32px;display:flex;flex-direction:column;align-items:center;text-align:center;}

.mark{
  font-family:'Dongle',sans-serif;
  font-size:64px;font-weight:700;color:var(--ink);
  margin-top:-36px;
  position:relative;z-index:2;
  line-height:1;
}

.mark-sub{
  display:none;
}

.tagline{
  font-family:'Cormorant Garamond',serif;
  font-size:20px;font-weight:300;font-style:italic;
  color:var(--ink2);
  margin-top:22px;
  line-height:1.5;
}

.divider{
  width:28px;height:1px;
  background:var(--gold);
  margin:28px auto 24px;
}

.features{
  width: 100%;
  display:flex;flex-direction:column;gap:18px;
  text-align:left;
  padding: 0 8px;
}

.feature{
  display:flex;align-items:center;gap:14px;
}
.feature svg{
  width:18px;height:18px;color:var(--gold);flex-shrink:0;
}
.feature span{
  font-family:'Noto Sans KR',sans-serif;
  font-size:13.5px;font-weight:300;color:var(--ink2);
  line-height:1.4;
}
.feature b{
  font-weight:400;color:var(--ink);
}

.bottom-area{
  margin-top:auto;
  padding: 28px 32px 36px;
  display:flex;flex-direction:column;align-items:center;
  gap:14px;
}

.start-btn{
  width:100%;
  background:var(--ink);
  color:var(--paper);
  border:none;
  border-radius:30px;
  padding:16px;
  font-family:'Noto Sans KR',sans-serif;
  font-size:14px;font-weight:400;
  letter-spacing:0.5px;
  cursor:pointer;
  transition:opacity 0.15s;
}
.start-btn:hover{opacity:0.85;}

.skip-text{
  font-family:'Noto Sans KR',sans-serif;
  font-size:11px;color:var(--ink3);
  cursor:pointer;letter-spacing:0.3px;
}

</style>
</head>
<body>

<div class="phone">

  <div class="photo-zone">
    <svg viewBox="0 0 390 420" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
      <defs>
        <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#E8DDD0"/>
          <stop offset="55%" stop-color="#D6C9B4"/>
          <stop offset="100%" stop-color="#C4B89E"/>
        </linearGradient>
        <linearGradient id="sun-glow" x1="0.5" y1="0.3" x2="0.5" y2="1">
          <stop offset="0%" stop-color="#FBF4E4" stop-opacity="0.95"/>
          <stop offset="100%" stop-color="#D6C9B4" stop-opacity="0"/>
        </linearGradient>
        <linearGradient id="fade-bottom" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#F8F4EE" stop-opacity="0"/>
          <stop offset="100%" stop-color="#F8F4EE" stop-opacity="1"/>
        </linearGradient>
        <linearGradient id="water" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#C9BBA0"/>
          <stop offset="100%" stop-color="#B8A98A"/>
        </linearGradient>
      </defs>

      <rect width="390" height="420" fill="url(#sky)"/>

      <ellipse cx="195" cy="150" rx="70" ry="70" fill="#FBF4E4" opacity="0.7"/>
      <rect x="0" y="0" width="390" height="300" fill="url(#sun-glow)"/>

      <path d="M0 230 Q100 190 195 215 T390 220 V420 H0 Z" fill="#A8967A" opacity="0.5"/>
      <path d="M0 260 Q120 230 195 245 T390 250 V420 H0 Z" fill="#8F7D62" opacity="0.45"/>

      <rect x="0" y="280" width="390" height="140" fill="url(#water)"/>
      <ellipse cx="195" cy="280" rx="60" ry="8" fill="#FBF4E4" opacity="0.4"/>

      <g opacity="0.52">
          <!-- galho principal -->
          <path d="M55 0 Q48 50 52 110 Q50 160 46 200" stroke="#7A9A6A" stroke-width="1.8" fill="none" stroke-linecap="round"/>
          <!-- folha 1 — topo, inclinada à esquerda -->
          <path d="M52 18 Q30 8 18 22 Q28 36 52 18Z" fill="#7A9A6A"/>
          <path d="M52 18 Q35 22 18 22" stroke="#5C7A4A" stroke-width="0.6" fill="none" opacity="0.5"/>
          <!-- folha 2 — direita, um pouco abaixo -->
          <path d="M51 42 Q70 30 80 42 Q68 56 51 42Z" fill="#6B8A55"/>
          <path d="M51 42 Q66 44 80 42" stroke="#5C7A4A" stroke-width="0.6" fill="none" opacity="0.5"/>
          <!-- folha 3 — esquerda -->
          <path d="M50 68 Q28 56 16 68 Q30 82 50 68Z" fill="#7A9A6A"/>
          <path d="M50 68 Q32 72 16 68" stroke="#5C7A4A" stroke-width="0.6" fill="none" opacity="0.5"/>
          <!-- folha 4 — direita, maior -->
          <path d="M50 96 Q74 82 86 96 Q72 112 50 96Z" fill="#6B8A55"/>
          <path d="M50 96 Q70 100 86 96" stroke="#5C7A4A" stroke-width="0.6" fill="none" opacity="0.5"/>
          <!-- folha 5 — esquerda, mais baixa -->
          <path d="M48 126 Q24 114 12 128 Q28 142 48 126Z" fill="#7A9A6A"/>
          <path d="M48 126 Q28 130 12 128" stroke="#5C7A4A" stroke-width="0.6" fill="none" opacity="0.5"/>
          <!-- folha 6 — direita -->
          <path d="M47 154 Q68 140 78 156 Q64 170 47 154Z" fill="#6B8A55" opacity="0.85"/>
          <path d="M47 154 Q64 158 78 156" stroke="#5C7A4A" stroke-width="0.6" fill="none" opacity="0.5"/>
      </g>

      <rect x="0" y="0" width="390" height="420" fill="url(#fade-bottom)"/>
    </svg>

    <div class="sbar">
      <span>9:41</span>
      <div style="display:flex;gap:6px;align-items:center">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.9)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12.55a11 11 0 0 1 14.08 0"/><path d="M1.42 9a16 16 0 0 1 21.16 0"/><path d="M8.53 16.11a6 6 0 0 1 6.95 0"/><line x1="12" y1="20" x2="12.01" y2="20"/></svg>
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.9)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="6" width="18" height="12" rx="2" ry="2"/><line x1="23" y1="13" x2="23" y2="11"/></svg>
      </div>
    </div>
  </div>

  <div class="content">

    <div class="mark">매일</div>

    <div class="tagline">Todos os dias com Deus</div>

    <div class="divider"></div>

    <div class="features">
      <div class="feature">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
        <span>Leia o <b>versículo do dia</b></span>
      </div>
      <div class="feature">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
        <span>Ouça em <b>coreano</b>, com destaque palavra por palavra</span>
      </div>
      <div class="feature">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
        <span>Toque nas palavras e <b>veja o significado</b></span>
      </div>
      <div class="feature">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
        <span>Guarde seus <b>favoritos</b></span>
      </div>
      <div class="feature">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
        <span>Compartilhe <b>beleza e esperança</b></span>
      </div>
    </div>

  </div>

  <div class="bottom-area">
    <button class="start-btn">Começar</button>
    <span class="skip-text">já tenho o hábito, pular</span>
  </div>

</div>

</body>
</html>
