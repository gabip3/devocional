<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>매일 — Hoje</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Dongle:wght@300;400;700&family=Noto+Sans+KR:wght@300;400&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400;1,600&display=swap');

* { box-sizing: border-box; margin: 0; padding: 0; }

:root{
  --paper:#F8F4EE;
  --paper2:#EDE6D6;
  --gold:#C9B99A;
  --ink:#2E2519;
  --ink2:#7A6E5A;
  --ink3:#B0A08A;
}

html, body {
  background:#E8E2D8;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Noto Sans KR', sans-serif;
}

.phone{
  width:100%;max-width:390px;
  margin:24px auto;
  background:var(--paper);
  min-height:800px;
  display:flex;flex-direction:column;
  overflow:hidden;
  position:relative;
  border-radius: 40px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.18);
}

.photo-zone{
  width:100%;height:260px;position:relative;overflow:hidden;flex-shrink:0;
}
.photo-zone svg{width:100%;height:100%;display:block;}

.sbar{
  position:absolute;top:0;left:0;right:0;
  padding:14px 24px 0;
  display:flex;justify-content:space-between;
  font-family:'Noto Sans KR',sans-serif;
  font-size:11px;color:rgba(255,255,255,0.9);font-weight:300;z-index:2;
}

.content{flex:1;padding:0 28px;display:flex;flex-direction:column;}

.date-ref{margin-top:8px;display:flex;justify-content:space-between;align-items:center;}
.date-row{display:flex;align-items:center;gap:7px;}
.date-txt{
  font-family:'Noto Sans KR',sans-serif;font-size:10px;color:var(--ink3);
  letter-spacing:1.5px;text-transform:uppercase;font-weight:300;
}
.cal-icon{width:13px;height:13px;flex-shrink:0;}

.ref-row{display:flex;align-items:center;gap:14px;}
.ref-txt{
  font-family:'Noto Sans KR',sans-serif;font-size:10px;color:var(--ink3);
  letter-spacing:1px;text-transform:uppercase;font-weight:300;
}
.heart-icon{width:17px;height:17px;cursor:pointer;flex-shrink:0;color:var(--ink3);transition:color 0.15s;}
.heart-icon.active{color:#A85C3E;fill:#A85C3E;}

.verse-ko{
  font-family:'Dongle',sans-serif;font-size:32px;font-weight:700;color:var(--ink);
  line-height:1.15;letter-spacing:0.1px;margin-top:24px;text-align:center;
}
.verse-ko .w{cursor:pointer;border-radius:2px;padding:0 2px;transition:background 0.15s,color 0.15s;}
.verse-ko .w.lit{background:var(--ink);color:var(--paper);}
.verse-ko .w.tap{background:var(--gold);color:var(--ink);}

.divider{width:24px;height:1px;background:var(--gold);margin:20px auto;}

.verse-pt{
  font-family:'Cormorant Garamond',serif;font-size:16px;font-weight:600;font-style:italic;
  color:var(--ink);line-height:1.4;text-align:center;
}

.meaning-area{
  margin:18px 0 0;min-height:52px;display:flex;align-items:center;justify-content:center;text-align:center;
}
.meaning-ko{font-family:'Dongle',sans-serif;font-size:26px;font-weight:700;color:var(--ink);margin-right:10px;}
.meaning-arrow{width:13px;height:13px;color:var(--gold);margin-right:10px;}
.meaning-def{font-family:'Cormorant Garamond',serif;font-size:16px;font-weight:600;font-style:italic;color:var(--ink);line-height:1.4;}
.meaning-empty{font-family:'Cormorant Garamond',serif;font-size:14px;font-weight:600;font-style:italic;color:var(--ink2);}

.player-zone{margin:20px 0 0;display:flex;align-items:center;gap:14px;}
.play-btn{
  width:36px;height:36px;border-radius:50%;background:transparent;
  border:0.5px solid var(--gold);display:flex;align-items:center;justify-content:center;
  cursor:pointer;flex-shrink:0;transition:background 0.15s;
}
.play-btn:hover{background:var(--paper2);}
.play-btn svg{width:14px;height:14px;color:var(--ink);}
.progress-track{flex:1;height:1px;background:var(--paper2);position:relative;border-radius:1px;cursor:pointer;}
.progress-fill{height:100%;background:var(--gold);border-radius:1px;width:0%;transition:width 0.1s linear;}
.progress-dot{width:6px;height:6px;border-radius:50%;background:var(--ink);position:absolute;top:50%;right:-3px;transform:translateY(-50%);}
.time-now{font-family:'Noto Sans KR',sans-serif;font-size:10px;color:var(--ink3);font-weight:300;}

.pw-section{margin-top:22px;border-top:0.5px solid var(--paper2);padding-top:16px;}
.pw-label{
  font-family:'Noto Sans KR',sans-serif;font-size:9px;color:var(--ink3);
  letter-spacing:1.8px;text-transform:uppercase;font-weight:300;margin-bottom:12px;text-align:center;
}
.words-row{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;}
.wchip{
  font-family:'Dongle',sans-serif;font-size:19px;font-weight:700;color:var(--ink2);
  cursor:pointer;padding:4px 10px;border-bottom:0.5px solid transparent;transition:all 0.12s;
  background:none;border-left:none;border-right:none;border-top:none;
}
.wchip:hover{color:var(--ink);border-bottom-color:var(--gold);}
.wchip.sel{color:var(--ink);border-bottom:1px solid var(--ink);}

.bottom-space{height:16px;}

.tabs{
  padding:14px 0 26px;display:flex;justify-content:space-around;
  border-top:0.5px solid var(--paper2);background:var(--paper);
}
.tab{display:flex;flex-direction:column;align-items:center;gap:5px;cursor:pointer;background:none;border:none;}
.tab span{
  font-family:'Noto Sans KR',sans-serif;font-size:9px;letter-spacing:0.8px;
  text-transform:uppercase;color:var(--ink3);font-weight:300;
}
.tab svg{width:19px;height:19px;color:var(--ink3);}
.tab.on svg{color:var(--ink);}
.tab.on span{color:var(--ink);}
.tab-dot{width:3px;height:3px;border-radius:50%;background:var(--ink);margin-top:1px;}
</style>
</head>
<body>

<div class="phone">

  <div class="photo-zone">
    <svg viewBox="0 0 390 260" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
      <defs>
        <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#D6C9B4"/>
          <stop offset="100%" stop-color="#E8DDD0"/>
        </linearGradient>
        <linearGradient id="light" x1="0.3" y1="0" x2="0.7" y2="1">
          <stop offset="0%" stop-color="#F5EFE2" stop-opacity="0.9"/>
          <stop offset="100%" stop-color="#D6C9B4" stop-opacity="0"/>
        </linearGradient>
        <linearGradient id="fade-bottom" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#F8F4EE" stop-opacity="0"/>
          <stop offset="100%" stop-color="#F8F4EE" stop-opacity="1"/>
        </linearGradient>
      </defs>
      <rect width="390" height="260" fill="url(#sky)"/>
      <rect x="60" y="0" width="140" height="260" fill="#E2D8C8" opacity="0.4"/>
      <rect x="80" y="0" width="2" height="260" fill="#C9B99A" opacity="0.3"/>
      <rect x="160" y="0" width="2" height="260" fill="#C9B99A" opacity="0.3"/>
      <rect x="60" y="80" width="142" height="2" fill="#C9B99A" opacity="0.3"/>
      <rect x="60" y="160" width="142" height="2" fill="#C9B99A" opacity="0.3"/>
      <rect x="62" y="2" width="96" height="76" fill="#D4C8B0" opacity="0.25"/>
      <rect x="162" y="2" width="96" height="76" fill="#EAE0CE" opacity="0.35"/>
      <rect x="62" y="164" width="96" height="94" fill="#D0C4AC" opacity="0.2"/>
      <rect x="162" y="82" width="96" height="76" fill="#DDD3C0" opacity="0.3"/>
      <ellipse cx="310" cy="180" rx="55" ry="70" fill="#5C7A4A" opacity="0.55"/>
      <ellipse cx="340" cy="160" rx="40" ry="55" fill="#6B8A55" opacity="0.45"/>
      <ellipse cx="290" cy="200" rx="35" ry="50" fill="#4A6A3A" opacity="0.4"/>
      <ellipse cx="325" cy="210" rx="25" ry="40" fill="#7A9A62" opacity="0.35"/>
      <rect x="320" y="210" width="4" height="50" fill="#4A3A28" opacity="0.6"/>
      <rect x="308" y="220" width="3" height="40" fill="#4A3A28" opacity="0.5"/>
      <ellipse cx="30" cy="100" rx="28" ry="38" fill="#6B8A55" opacity="0.5"/>
      <ellipse cx="15" cy="120" rx="20" ry="30" fill="#5C7A4A" opacity="0.45"/>
      <rect x="0" y="0" width="390" height="260" fill="url(#light)" opacity="0.6"/>
      <rect x="0" y="0" width="390" height="260" fill="url(#fade-bottom)"/>
    </svg>

    <div class="sbar">
      <span>9:41</span>
      <div style="display:flex;gap:6px;align-items:center">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.9)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12.55a11 11 0 0 1 14.08 0"/><path d="M1.42 9a16 16 0 0 1 21.16 0"/><path d="M8.53 16.11a6 6 0 0 1 6.95 0"/><line x1="12" y1="20" x2="12.01" y2="20"/></svg>
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.9)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="6" width="18" height="12" rx="2" ry="2"/><line x1="23" y1="13" x2="23" y2="11"/></svg>
      </div>
    </div>
  </div>

  <div class="content">

    <div class="date-ref">
      <div class="date-row">
        <svg class="cal-icon" viewBox="0 0 24 24" fill="none" stroke="#B0A08A" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        <span class="date-txt">18 de junho</span>
      </div>
      <div class="ref-row">
        <span class="ref-txt">Filipenses 4:6</span>
        <svg class="heart-icon" id="heartIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" onclick="toggleHeart()">
          <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
        </svg>
      </div>
    </div>

    <div class="verse-ko" id="vko">
      <span class="w" data-i="0">아무것도</span> <span class="w" data-i="1">염려하지</span> <span class="w" data-i="2">말고</span><br>
      <span class="w" data-i="3">다만</span> <span class="w" data-i="4">모든</span> <span class="w" data-i="5">일에</span><br>
      <span class="w" data-i="6">기도와</span> <span class="w" data-i="7">간구로</span><br>
      <span class="w" data-i="8">하나님께</span> <span class="w" data-i="9">아뢰라</span>
    </div>

    <div class="divider"></div>

    <div class="verse-pt">
      Não andem ansiosos por coisa alguma; em tudo,<br>
      apresentai os vossos pedidos a Deus.
    </div>

    <div class="meaning-area" id="mzone">
      <span class="meaning-empty">toque em uma palavra</span>
    </div>

    <div class="player-zone">
      <button class="play-btn" onclick="togglePlay()" id="pbtn">
        <svg id="playIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>
      </button>
      <div class="progress-track" id="track">
        <div class="progress-fill" id="pfill"></div>
        <div class="progress-dot" id="pdot"></div>
      </div>
      <span class="time-now" id="ct">0:00</span>
    </div>

    <div class="pw-section">
      <div class="pw-label">palavra por palavra</div>
      <div class="words-row" id="chips"></div>
    </div>

    <div class="bottom-space"></div>
  </div>

  <div class="tabs">
    <button class="tab on">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      <span>Hoje</span>
      <div class="tab-dot"></div>
    </button>
    <button class="tab">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
      <span>Versículos</span>
    </button>
    <button class="tab">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
      <span>Guardar</span>
    </button>
  </div>

</div>

<script>
const words=[
  {ko:'아무것도',pt:'Nada. Coisa alguma.'},
  {ko:'염려하지',pt:'Ansiedade — "não fique ansioso".'},
  {ko:'말고',pt:'Não. Nega a ação anterior.'},
  {ko:'다만',pt:'Apenas. Somente.'},
  {ko:'모든',pt:'Todos. Tudo.'},
  {ko:'일에',pt:'Em tudo. Em toda situação.'},
  {ko:'기도와',pt:'Oração.'},
  {ko:'간구로',pt:'Súplica. Pedido do coração.'},
  {ko:'하나님께',pt:'A Deus. Diante de Deus.'},
  {ko:'아뢰라',pt:'Apresente. Traga diante de Deus.'},
];

const chips=document.getElementById('chips');
words.forEach((w,i)=>{
  const c=document.createElement('button');
  c.className='wchip';c.textContent=w.ko;
  c.onclick=()=>tapWord(i);chips.appendChild(c);
});

const spans=document.querySelectorAll('#vko .w');
spans.forEach(s=>s.onclick=()=>tapWord(+s.dataset.i));

function speakWord(text){
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'ko-KR';
  u.rate = 0.8;
  u.pitch = 1.0;
  const voices = speechSynthesis.getVoices();
  const koVoice = voices.find(v => v.lang === 'ko-KR' || v.lang === 'ko_KR');
  if(koVoice) u.voice = koVoice;
  speechSynthesis.speak(u);
}

function tapWord(i){
  document.querySelectorAll('.wchip').forEach((c,ci)=>c.classList.toggle('sel',ci===i));
  spans.forEach(s=>s.classList.remove('tap'));
  spans[i]?.classList.add('tap');
  const mz=document.getElementById('mzone');
  mz.innerHTML=`<span class="meaning-ko">${words[i].ko}</span><svg class="meaning-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg><span class="meaning-def">${words[i].pt}</span>`;
  speakWord(words[i].ko);
}

let playing=false,litIdx=-1,utterance=null;

function togglePlay(){
  const ico=document.getElementById('playIcon');

  if(playing){
    // parar
    speechSynthesis.cancel();
    playing=false;
    ico.innerHTML='<polygon points="5 3 19 12 5 21 5 3"></polygon>';
    spans.forEach(s=>s.classList.remove('lit'));
    litIdx=-1;
    document.getElementById('pfill').style.width='0%';
    document.getElementById('ct').textContent='0:00';
    return;
  }

  // montar texto completo do versículo
  const fullText = words.map(w=>w.ko).join(' ');
  utterance = new SpeechSynthesisUtterance(fullText);
  utterance.lang = 'ko-KR';
  utterance.rate = 0.85;
  utterance.pitch = 1.0;

  // tentar usar voz coreana disponível
  const voices = speechSynthesis.getVoices();
  const koVoice = voices.find(v => v.lang === 'ko-KR' || v.lang === 'ko_KR');
  if(koVoice) utterance.voice = koVoice;

  playing=true;
  ico.innerHTML='<rect x="6" y="4" width="4" height="16"></rect><rect x="14" y="4" width="4" height="16"></rect>';

  // destaque palavra por palavra via boundary event
  utterance.onboundary = (e)=>{
    if(e.name !== 'word') return;
    const charIdx = e.charIndex;
    // descobrir qual palavra estamos
    let acc=0;
    for(let i=0;i<words.length;i++){
      if(charIdx <= acc + words[i].ko.length){
        if(i!==litIdx){
          spans.forEach(s=>s.classList.remove('lit'));
          litIdx=i;
          spans[i]?.classList.add('lit');
          // scroll chip visível
          document.querySelectorAll('.wchip')[i]?.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'});
          // atualizar progresso
          const pct = Math.round((i/(words.length-1))*100);
          document.getElementById('pfill').style.width=pct+'%';
          const totalSecs = 62;
          const elapsed = Math.round((i/(words.length-1))*totalSecs);
          document.getElementById('ct').textContent='0:'+String(elapsed).padStart(2,'0');
        }
        break;
      }
      acc += words[i].ko.length + 1;
    }
  };

  utterance.onend = ()=>{
    playing=false;
    ico.innerHTML='<polygon points="5 3 19 12 5 21 5 3"></polygon>';
    spans.forEach(s=>s.classList.remove('lit'));
    litIdx=-1;
    document.getElementById('pfill').style.width='100%';
    document.getElementById('ct').textContent='1:02';
    setTimeout(()=>{
      document.getElementById('pfill').style.width='0%';
      document.getElementById('ct').textContent='0:00';
    },1500);
  };

  utterance.onerror = ()=>{
    playing=false;
    ico.innerHTML='<polygon points="5 3 19 12 5 21 5 3"></polygon>';
  };

  speechSynthesis.speak(utterance);
}

// carregar vozes (alguns browsers carregam async)
speechSynthesis.onvoiceschanged = ()=>{ speechSynthesis.getVoices(); };

function toggleHeart(){
  const h=document.getElementById('heartIcon');
  h.classList.toggle('active');
}
</script>

</body>
</html>
